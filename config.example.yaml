app:
  name: tudns
  host: 0.0.0.0
  port: 8080
  mode: release
  data_dir: data

security:
  # 生产环境必须修改
  secret_key: change-me-before-production-tudns-secret
  token_ttl_hours: 72
  install_token: ""

cors:
  allow_origins:
    - "*"

# 限流配置（默认关闭）
rate:
  enabled: false
  limit: 60
  interval: 60
