name: Bug report
description: 报告可复现的问题
title: "[Bug]: "
labels: [bug]
body:
  - type: textarea
    attributes:
      label: 问题描述
      description: 请说明实际行为和预期行为。
    validations:
      required: true
  - type: textarea
    attributes:
      label: 复现步骤
      placeholder: |
        1. 启动 TuDNS
        2. 进入某页面
        3. 执行某操作
    validations:
      required: true
  - type: input
    attributes:
      label: TuDNS 版本
    validations:
      required: true
  - type: dropdown
    attributes:
      label: 数据库
      options: [SQLite, MySQL, PostgreSQL]
    validations:
      required: true
  - type: textarea
    attributes:
      label: 环境与日志
      description: 请移除密钥、Token、DSN 密码和个人数据。
